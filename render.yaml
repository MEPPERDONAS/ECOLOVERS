services:
  - type: web
    name: mi-app-flask
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mi-db-flask
          property: connectionString
      - key: SECRET_KEY
        generate: true # Render genera una clave secreta automáticamente

databases:
  - name: mi-db-flask
    plan: free # El plan gratuito de PostgreSQLpipreqs . --force