<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso · Clasificador de Residuos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
  <div class="header-logo">
      <img src="{{ url_for('static', filename='LOGO.PNG') }}" alt="ecoloverlogo">

  </div>

  <div class="login-card">
    <h2>¡transforma tus acciones!</h2>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" class="login-form">
      <label>
        
        <input type="text" placeholder="Usuario" name="username" required autocomplete="username">
      </label>
      <label>
        
        <input type="password" placeholder="Contraseña" name="password" required autocomplete="current-password">
      </label>
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
    <div class="login-links">
      <span>¿Nuevo en reciclolovers?</span>
      <a href="{{ url_for('register') }}">Crear cuenta</a>
      <a href="{{ url_for('forgot_password') }}">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>

</body>
</html>
